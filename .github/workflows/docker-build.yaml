name: Build and Push Docker Image to GHCR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
   build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
            cd ./App/Frontend
            npm install
      - name: Build Angular Application
        run: |
          cd ./App/Frontend
            npm run build -- --project Frontend --configuration production
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u eliasdhcom --password-stdin
      - name: Build/Push Frontend Docker Image
        run: |
          docker build --push -t ghcr.io/eliasdhcom/eliasdhcom-frontend:latest ./App/Frontend
      - name: Notify EliasDH App to restart deployments
        if: github.event_name == 'push'
        env:
          NAMESPACE: eliasdhcom
          DOMAIN: eliasdh.com
          IMAGES: |
            ghcr.io/eliasdhcom/eliasdhcom-frontend:latest
        run: |
          IMAGES_JSON=$(printf '%s' "$IMAGES" | jq -R . | jq -sc .)
          curl -sf -X POST "https://app.eliasdh.com/api/v1/cluster/deploy/restart" \
            -H "X-API-Key: ${{ secrets.ELIASDH_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg ns "$NAMESPACE" --arg domain "$DOMAIN" --argjson images "$IMAGES_JSON" --arg runId "${{ github.run_id }}-${{ github.run_attempt }}" \
              '{namespace: $ns, domain: $domain, images: $images, runId: $runId}')"
