<app-contact-bar></app-contact-bar>
<div class="status-page">
    <app-page-header titleKey="STATUS.TITLE" backLabelKey="STATUS.BACK" backRoute="/"></app-page-header>
    <div class="status-content">
        <app-loading-spinner *ngIf="loading && !health" messageKey="STATUS.LOADING"></app-loading-spinner>
        <app-error-box *ngIf="error && !health" [errorMessage]="error"></app-error-box>
        <div class="status-card" *ngIf="health" [ngClass]="health.healthy ? 'status-ok' : 'status-down'">
            <div class="status-icon">
                <svg *ngIf="health.healthy" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="11" fill="currentColor" opacity="0.15"/>
                    <path d="M7 12.5L10.5 16L17 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <svg *ngIf="!health.healthy" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="11" fill="currentColor" opacity="0.15"/>
                    <path d="M8 8L16 16M16 8L8 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="status-title">
                {{ (health.healthy ? 'STATUS.ALL_OPERATIONAL' : 'STATUS.DEGRADED') | translate }}
            </h1>
            <p class="status-subtitle">
                {{ health.nodesReady }} / {{ health.nodesTotal }} {{ 'STATUS.NODES_HEALTHY' | translate }}
            </p>
            <p class="status-updated">{{ 'STATUS.UPDATED' | translate }}: {{ health.timestamp | date: 'HH:mm:ss' }}</p>
        </div>
    </div>
    <app-footer></app-footer>
</div>
<app-exit-intent></app-exit-intent>
