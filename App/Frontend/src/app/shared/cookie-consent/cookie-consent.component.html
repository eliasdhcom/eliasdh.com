<section class="cookie-overlay" *ngIf="showConsent">
    <section class="cookie-popup">
        <section class="cookie-icon">
            <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <circle cx="8.5" cy="9.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="15" cy="7" r="1" fill="currentColor" stroke="none"/>
                <circle cx="15.5" cy="14.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="9" cy="15" r="1" fill="currentColor" stroke="none"/>
            </svg>
        </section>
        <h3 class="cookie-title">{{'COOKIE-CONSENT.TITLE' | translate}}</h3>
        <p class="cookie-text">{{'COOKIE-CONSENT.TEXT' | translate}}</p>
        <section class="cookie-policy-links">
            <a routerLink="/privacypolicy" class="cookie-policy-link cursor-pointer" [title]="'COOKIE-CONSENT.PRIVACY-LINK' | translate">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </a>
            <a routerLink="/legalguidelines" class="cookie-policy-link cursor-pointer" [title]="'COOKIE-CONSENT.LEGAL-LINK' | translate">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
            </a>
        </section>
        <section class="cookie-buttons">
            <button class="cookie-btn cookie-btn-decline cursor-pointer" (click)="decline()">
                {{'COOKIE-CONSENT.DECLINE' | translate}}
            </button>
            <button class="cookie-btn cookie-btn-accept cursor-pointer" (click)="accept()">
                {{'COOKIE-CONSENT.ACCEPT' | translate}}
            </button>
        </section>
    </section>
</section>
<section class="cookie-overlay cookie-blocked-overlay" *ngIf="showBlocked">
    <section class="cookie-popup cookie-blocked-popup">
        <section class="cookie-blocked-icon">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
            </svg>
        </section>
        <h3 class="cookie-title">{{'COOKIE-CONSENT.BLOCKED-TITLE' | translate}}</h3>
        <p class="cookie-text">{{'COOKIE-CONSENT.BLOCKED-TEXT' | translate}}</p>
        <button class="cookie-btn cookie-btn-accept cursor-pointer" (click)="changeChoice()">
            {{'COOKIE-CONSENT.BLOCKED-CHANGE' | translate}}
        </button>
    </section>
</section>
